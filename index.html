<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>セッションボード — 辺境TRPG村</title>
<style>
:root{--bg:#fbf7f0;--card:#fff;--tx:#3b3a36;--mut:#8a857c;--grn:#33603f;--grn2:#4f8160;--ter:#c86c3e;--cln:#e6ded2;--gold:#b98a2f;--sun:#b0483a;--sat:#3a5f8a}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:'Zen Kaku Gothic New','Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif;line-height:1.6}
.wrap{max-width:860px;margin:0 auto;padding:14px 12px 70px}
header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
h1{font-family:'Shippori Mincho','Yu Mincho',serif;font-size:1.4em;color:var(--grn);margin:.3em 0 0}
.fresh{font-size:.72em;color:var(--mut)}
.toolrow{display:flex;gap:8px;margin:10px 0 4px;flex-wrap:wrap;align-items:center}
.f{border:1.5px solid var(--cln);background:#fffdf9;border-radius:20px;padding:7px 13px;font-size:.85em;font-family:inherit;cursor:pointer;color:var(--mut)}
.f.on{background:var(--grn);border-color:var(--grn);color:#fff;font-weight:700}
.tolink{margin-left:auto;font-size:.85em;color:var(--ter);text-decoration:none;font-weight:700;padding:7px 2px}
/* ---- カレンダー ---- */
.calhead{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 0 8px}
.calhead h2{font-family:'Shippori Mincho',serif;color:var(--grn);font-size:1.5em;margin:0;min-width:7.2em;text-align:center}
.nav{border:1.5px solid var(--cln);background:#fffdf9;border-radius:10px;padding:8px 16px;font-size:1em;font-family:inherit;cursor:pointer;color:var(--grn)}
.today-btn{font-size:.78em;padding:8px 12px}
.calsum{text-align:center;font-size:.82em;color:var(--mut);margin-bottom:8px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dow{text-align:center;font-size:.75em;font-weight:700;color:var(--mut);padding:2px 0}
.dow.sun{color:var(--sun)}.dow.sat{color:var(--sat)}
.cell{background:var(--card);border:1px solid var(--cln);border-radius:9px;min-height:86px;padding:4px 4px 3px;cursor:pointer;position:relative;transition:box-shadow .15s}
.cell:hover{box-shadow:0 4px 12px rgba(0,0,0,.08)}
.cell.out{background:transparent;border-color:transparent;cursor:default}
.cell.today{border:2px solid var(--ter)}
.cell.sel{outline:3px solid var(--grn2);outline-offset:-1px}
.cell .dn{font-size:.78em;font-weight:700;color:var(--mut)}
.cell.sunday .dn{color:var(--sun)}.cell.saturday .dn{color:var(--sat)}
.sch{display:block;border-radius:6px;padding:1px 5px;margin-top:2px;font-size:.68em;line-height:1.5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:#e4eee6;color:var(--grn);border-left:3px solid var(--grn2)}
.sch.closed{background:#efe9df;color:#8a857c;border-left-color:#b9b2a6}
.sch.done{background:#f3efe7;color:#b3ac9f;border-left-color:#d6cfc2}
.more{font-size:.66em;color:var(--ter);font-weight:700;padding-left:4px}
@media(max-width:560px){
 .cell{min-height:58px;padding:3px 3px 2px}
 .sch{font-size:0;padding:0;height:7px;margin-top:3px;border-left:none}
 .cnt{position:absolute;bottom:3px;right:5px;font-size:.72em;font-weight:700;color:var(--grn)}
}
.cnt{display:none}
@media(max-width:560px){.cnt{display:block}}
/* ---- 選択日の詳細・すり合わせ・リスト ---- */
.section{font-family:'Shippori Mincho',serif;color:var(--grn);font-size:1.05em;margin:20px 4px 6px;border-bottom:2px solid var(--cln);padding-bottom:3px}
.card{display:block;background:var(--card);border:1px solid var(--cln);border-left:5px solid var(--grn2);border-radius:12px;padding:11px 13px;margin:7px 0;text-decoration:none;color:var(--tx);position:relative;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08)}
.card.closed{border-left-color:#b9b2a6;opacity:.78}
.card.done{border-left-color:#cfc8bb;opacity:.55}
.card .when{font-weight:700;font-size:.98em}
.card .when .wd{color:var(--mut);font-weight:400;font-size:.9em}
.card .name{font-family:'Shippori Mincho',serif;font-size:1.1em;margin:1px 0}
.card .meta{font-size:.8em;color:var(--mut);display:flex;gap:10px;flex-wrap:wrap}
.badge{position:absolute;top:9px;right:11px;font-size:.7em;font-weight:700;border-radius:12px;padding:3px 10px}
.b-open{background:#e4eee6;color:var(--grn)}
.b-closed{background:#efe9df;color:#8a857c}
.b-done{background:#efe9df;color:#a9a293}
.b-suri{background:#fdf1e4;color:var(--ter)}
.new{display:inline-block;background:var(--ter);color:#fff;font-size:.66em;font-weight:700;border-radius:8px;padding:1px 7px;margin-left:6px;vertical-align:2px}
.reg{color:var(--gold);font-weight:700}
.empty{color:var(--mut);text-align:center;padding:24px 0;font-size:.9em}
.manual{margin-top:26px;border:1px dashed var(--cln);border-radius:12px;padding:12px 14px;background:#fffdf9;font-size:.84em;color:var(--mut)}
.manual b{color:var(--grn)}
.manual code{background:#f4efe6;border-radius:6px;padding:2px 8px;color:var(--tx);display:inline-block;margin:4px 0}
footer{margin-top:24px;font-size:.72em;color:var(--mut);text-align:center}
</style>
</head>
<body>
<div class="wrap">
<header>
 <h1>セッションボード</h1>
 <div class="fresh" id="fresh">読込中…</div>
</header>
<div class="toolrow">
 <button class="f on" data-f="all">すべて</button>
 <button class="f" data-f="open">募集中だけ</button>
 <a class="tolink" href="takutate.html">🛠 卓を立てる →</a>
</div>

<div class="calhead">
 <button class="nav" id="prev">◀</button>
 <h2 id="calTitle">…</h2>
 <button class="nav" id="next">▶</button>
 <button class="nav today-btn" id="todayBtn">今月</button>
</div>
<div class="calsum" id="calSum"></div>
<div class="cal" id="cal"></div>

<div id="suriSec"></div>
<div id="daySec"></div>
<div id="monthSec"></div>

<div class="manual">
<b>📌 このボードは自動更新です</b>：卓部屋フォーラムにトピックを立てれば（過去実績で<b>97%</b>のタイトルを自動認識）勝手に載ります。GMの記入作業は不要。<br>
<b>手動で載せたい時</b>：専用スレッドに1行→
<code>7/20 21:00-25:00【レギュ名】シナリオ名 GM:名前</code><br>
載せたくない卓はトピックに「掲載不要」と書けば外れます。
</div>
<footer>辺境TRPG村 セッションボード（プロトタイプ）／時刻はすべて日本時間</footer>
</div>

<script>
(function(){
const WD=["日","月","火","水","木","金","土"];
let DATA=null,FILTER="all",selDate=null;
const now=new Date();let curY=now.getFullYear(),curM=now.getMonth(); // 0-based
const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,"0");
const key=(y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;
function jd(s){const[a,b,c]=s.split("-").map(Number);return new Date(a,b-1,c)}
function esc(t){const d=document.createElement("div");d.textContent=t||"";return d.innerHTML}
function stOf(s){
 const t=new Date();t.setHours(0,0,0,0);
 if(s.dates&&s.dates.length){
  const last=jd(s.dates[s.dates.length-1].date);
  if((t-last)/86400000>0)return"done";
 }
 if(s.suriawase)return"suri";
 return s.open?"open":"closed";
}
function visible(st){return FILTER==="all"||st==="open"}
// 日付→その日のセッション一覧
function dayMap(){
 const m={};
 (DATA.sessions||[]).forEach(s=>{const st=stOf(s);
  if(!visible(st)&&st!=="done")return;
  if(FILTER==="open"&&st!=="open")return;
  (s.dates||[]).forEach(d=>{(m[d.date]=m[d.date]||[]).push({s,st,d})})});
 return m;
}
function renderCal(){
 const map=dayMap();
 $("calTitle").textContent=`${curY}年 ${curM+1}月`;
 const first=new Date(curY,curM,1),days=new Date(curY,curM+1,0).getDate();
 const cal=$("cal");cal.innerHTML=WD.map((w,i)=>`<div class="dow${i===0?" sun":i===6?" sat":""}">${w}</div>`).join("");
 for(let i=0;i<first.getDay();i++)cal.insertAdjacentHTML("beforeend",`<div class="cell out"></div>`);
 const todayK=key(now.getFullYear(),now.getMonth(),now.getDate());
 let monthCount=0,openCount=0;
 for(let d=1;d<=days;d++){
  const k=key(curY,curM,d),list=map[k]||[];monthCount+=list.length;openCount+=list.filter(x=>x.st==="open").length;
  const dow=new Date(curY,curM,d).getDay();
  const cell=document.createElement("div");
  cell.className="cell"+(k===todayK?" today":"")+(k===selDate?" sel":"")+(dow===0?" sunday":dow===6?" saturday":"");
  let chips=list.slice(0,3).map(x=>`<span class="sch ${x.st}">${x.d.start||""} ${esc(x.s.scenario)}</span>`).join("");
  if(list.length>3)chips+=`<span class="more">+${list.length-3}</span>`;
  cell.innerHTML=`<span class="dn">${d}</span>${chips}${list.length?`<span class="cnt">${list.length}卓</span>`:""}`;
  cell.addEventListener("click",()=>{selDate=(selDate===k?null:k);renderCal();renderDay()});
  cal.appendChild(cell);
 }
 $("calSum").textContent=monthCount?`この月の卓：${monthCount}件（うち募集中 ${openCount}件）`:"この月の卓はまだありません";
}
function card({s,st}){
 const isNew=s.created&&(Date.now()-new Date(s.created).getTime())<3*86400000;
 const badge=st==="open"?`<span class="badge b-open">募集中</span>`:st==="suri"?`<span class="badge b-suri">調整中</span>`:st==="done"?`<span class="badge b-done">開催済</span>`:`<span class="badge b-closed">〆切</span>`;
 const when=st==="suri"?"日程すり合わせ中":(s.dates||[]).map(d=>{const x=jd(d.date);return`${x.getMonth()+1}/${x.getDate()}<span class="wd">(${WD[x.getDay()]})</span> ${d.start||""}${d.end?"-"+d.end:""}`}).join(" ／ ");
 return`<a class="card${st==="closed"?" closed":st==="done"?" done":""}"${s.url?` href="${s.url}" target="_blank" rel="noopener"`:""}>${badge}
  <div class="when">${when}${isNew?'<span class="new">NEW</span>':""}</div>
  <div class="name">${esc(s.scenario)}</div>
  <div class="meta">${s.reg&&!s.reg_is_name?`<span class="reg">【${esc(s.reg)}】</span>`:""}${s.gm?`<span>GM: ${esc(s.gm)}</span>`:""}${s.source==="manual"?"<span>✍ 手動掲載</span>":""}</div></a>`;
}
function renderDay(){
 const el=$("daySec");
 if(!selDate){el.innerHTML="";return}
 const map=dayMap(),list=map[selDate]||[];
 const d=jd(selDate);
 el.innerHTML=`<div class="section">📌 ${d.getMonth()+1}/${d.getDate()}(${WD[d.getDay()]}) の卓</div>`+
  (list.length?list.map(card).join(""):`<div class="empty">この日の卓はありません（＝空いてる！卓を立てるチャンス）</div>`);
 el.scrollIntoView({behavior:"smooth",block:"nearest"});
}
function renderSuri(){
 const list=(DATA.sessions||[]).map(s=>({s,st:stOf(s)})).filter(x=>x.st==="suri").filter(x=>FILTER==="all"||x.st==="open"||x.st==="suri");
 $("suriSec").innerHTML=list.length?`<div class="section">📅 日程すり合わせ中の卓</div>`+list.map(card).join(""):"";
}
function renderMonth(){
 const items=(DATA.sessions||[]).map(s=>({s,st:stOf(s)}))
  .filter(x=>x.s.dates&&x.s.dates.length&&x.s.dates.some(d=>{const t=jd(d.date);return t.getFullYear()===curY&&t.getMonth()===curM}))
  .filter(x=>FILTER==="all"||x.st==="open");
 items.sort((a,b)=>a.s.dates[0].date<b.s.dates[0].date?-1:1);
 $("monthSec").innerHTML=items.length?`<div class="section">🗒 ${curM+1}月の卓一覧</div>`+items.map(card).join(""):"";
}
function renderAll(){renderCal();renderSuri();renderDay();renderMonth()}
$("prev").addEventListener("click",()=>{curM--;if(curM<0){curM=11;curY--}selDate=null;renderAll()});
$("next").addEventListener("click",()=>{curM++;if(curM>11){curM=0;curY++}selDate=null;renderAll()});
$("todayBtn").addEventListener("click",()=>{curY=now.getFullYear();curM=now.getMonth();selDate=null;renderAll()});
document.querySelectorAll(".toolrow .f").forEach(b=>b.addEventListener("click",()=>{
 document.querySelectorAll(".toolrow .f").forEach(x=>x.classList.remove("on"));b.classList.add("on");FILTER=b.dataset.f;renderAll()}));
fetch("sessions.json?t="+Date.now()).then(r=>r.json()).then(d=>{
 DATA=d;$("fresh").innerHTML=`最終更新: ${d.updated||"?"}　<span style="opacity:.7">（15分ごとに自動更新）</span>`;renderAll();
}).catch(()=>{$("cal").innerHTML="";$("calSum").textContent="データの読込に失敗しました"});
})();
</script>
</body>
</html>
