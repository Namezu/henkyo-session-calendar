<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>セッションボード — 辺境TRPG村</title>
<style>
:root{--bg:#fbf7f0;--card:#fff;--tx:#3b3a36;--mut:#8a857c;--grn:#33603f;--grn2:#4f8160;--ter:#c86c3e;--cln:#e6ded2;--gold:#b98a2f}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--tx);font-family:'Zen Kaku Gothic New','Yu Gothic','Hiragino Kaku Gothic ProN',sans-serif;line-height:1.65}
.wrap{max-width:720px;margin:0 auto;padding:14px 14px 70px}
header{display:flex;align-items:baseline;justify-content:space-between;gap:10px;flex-wrap:wrap}
h1{font-family:'Shippori Mincho','Yu Mincho',serif;font-size:1.5em;color:var(--grn);margin:.3em 0 0}
.fresh{font-size:.75em;color:var(--mut)}
.toolrow{display:flex;gap:8px;margin:12px 0 6px;flex-wrap:wrap}
.f{border:1.5px solid var(--cln);background:#fffdf9;border-radius:20px;padding:8px 14px;font-size:.88em;font-family:inherit;cursor:pointer;color:var(--mut)}
.f.on{background:var(--grn);border-color:var(--grn);color:#fff;font-weight:700}
.tolink{margin-left:auto;font-size:.85em;color:var(--ter);text-decoration:none;font-weight:700;padding:8px 2px}
.month{font-family:'Shippori Mincho',serif;color:var(--grn);font-size:1.1em;margin:20px 4px 8px;border-bottom:2px solid var(--cln);padding-bottom:4px}
.card{display:block;background:var(--card);border:1px solid var(--cln);border-left:5px solid var(--grn2);border-radius:12px;padding:12px 14px;margin:8px 0;text-decoration:none;color:var(--tx);position:relative;transition:transform .15s,box-shadow .15s}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.08)}
.card.closed{border-left-color:#b9b2a6;opacity:.75}
.card.done{border-left-color:#cfc8bb;opacity:.55}
.card .when{font-weight:700;font-size:1.02em}
.card .when .wd{color:var(--mut);font-weight:400;font-size:.9em}
.card .name{font-family:'Shippori Mincho',serif;font-size:1.12em;margin:2px 0}
.card .meta{font-size:.82em;color:var(--mut);display:flex;gap:10px;flex-wrap:wrap}
.badge{position:absolute;top:10px;right:12px;font-size:.72em;font-weight:700;border-radius:12px;padding:3px 10px}
.b-open{background:#e4eee6;color:var(--grn)}
.b-closed{background:#efe9df;color:#8a857c}
.b-done{background:#efe9df;color:#a9a293}
.b-suri{background:#fdf1e4;color:var(--ter)}
.new{display:inline-block;background:var(--ter);color:#fff;font-size:.68em;font-weight:700;border-radius:8px;padding:1px 7px;margin-left:6px;vertical-align:2px}
.reg{color:var(--gold);font-weight:700}
.empty{color:var(--mut);text-align:center;padding:40px 0}
.manual{margin-top:26px;border:1px dashed var(--cln);border-radius:12px;padding:12px 14px;background:#fffdf9;font-size:.85em;color:var(--mut)}
.manual b{color:var(--grn)}
.manual code{background:#f4efe6;border-radius:6px;padding:2px 8px;color:var(--tx);display:inline-block;margin:4px 0}
footer{margin-top:26px;font-size:.75em;color:var(--mut);text-align:center}
</style>
</head>
<body>
<div class="wrap">
<header>
 <h1>セッションボード</h1>
 <div class="fresh" id="fresh">読込中…</div>
</header>
<div class="toolrow" id="filters">
 <button class="f on" data-f="all">すべて</button>
 <button class="f" data-f="open">募集中だけ</button>
 <button class="f" data-f="suri">すり合わせ中</button>
 <a class="tolink" href="takutate.html">🛠 卓を立てる（ジェネレータ）→</a>
</div>
<div id="list"><div class="empty">読込中…</div></div>

<div class="manual">
<b>📌 このボードは自動更新です</b>：卓部屋フォーラムにトピックを立てれば（タイトルが定型なら）自動で載ります。GMの記入作業は不要。<br>
<b>手動で載せたい時</b>：専用スレッドに1行書くだけ→
<code>7/20 21:00-25:00【レギュ名】シナリオ名 GM:名前</code><br>
載せたくない卓はトピックに「掲載不要」と書けば外れます。
</div>
<footer>辺境TRPG村 セッションボード（プロトタイプ）／時刻はすべて日本時間</footer>
</div>

<script>
(function(){
const WD=["日","月","火","水","木","金","土"];
let DATA=null,FILTER="all";
function jd(s){const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)}
function fmtDate(x){const d=jd(x);return`${d.getMonth()+1}/${d.getDate()}<span class="wd">(${WD[d.getDay()]})</span>`}
function status(s){
 // 開催済判定：最終開催日が過ぎていたら done（7日過ぎたら非表示）
 const today=new Date();today.setHours(0,0,0,0);
 if(s.dates&&s.dates.length){
  const last=jd(s.dates[s.dates.length-1].date);
  const diff=(today-last)/86400000;
  if(diff>7)return"hidden";
  if(diff>0)return"done";
 }
 if(s.suriawase)return"suri";
 return s.open?"open":"closed";
}
function render(){
 if(!DATA)return;
 const list=document.getElementById("list");list.innerHTML="";
 const items=DATA.sessions.map(s=>({s,st:status(s)})).filter(x=>x.st!=="hidden")
  .filter(x=>FILTER==="all"||(FILTER==="open"&&x.st==="open")||(FILTER==="suri"&&x.st==="suri"));
 // 並び：すり合わせ→日付昇順→開催済は最後
 const key=x=>x.st==="done"?"9999":(x.s.dates&&x.s.dates.length?x.s.dates[0].date:"0000-00-00");
 items.sort((a,b)=>key(a)<key(b)?-1:1);
 if(!items.length){list.innerHTML=`<div class="empty">該当する卓はまだありません</div>`;return}
 let curMonth="";
 const now=Date.now();
 items.forEach(({s,st})=>{
  const first=s.dates&&s.dates.length?s.dates[0].date:null;
  const mLabel=st==="suri"?"📅 日程すり合わせ中":first?`${jd(first).getFullYear()}年${jd(first).getMonth()+1}月`:"その他";
  if(mLabel!==curMonth){curMonth=mLabel;const h=document.createElement("div");h.className="month";h.textContent=mLabel;list.appendChild(h)}
  const a=document.createElement("a");a.className="card"+(st==="closed"?" closed":st==="done"?" done":"");
  if(s.url)a.href=s.url,a.target="_blank",a.rel="noopener";
  const when=st==="suri"?"日程すり合わせ":
   s.dates.map(d=>`${fmtDate(d.date)} ${d.start||""}${d.end?"-"+d.end:""}`).join(" ／ ");
  const isNew=s.created&&(now-new Date(s.created).getTime())<3*86400000;
  const badge=st==="open"?`<span class="badge b-open">募集中</span>`:st==="suri"?`<span class="badge b-suri">調整中</span>`:st==="done"?`<span class="badge b-done">開催済</span>`:`<span class="badge b-closed">〆切</span>`;
  a.innerHTML=`${badge}<div class="when">${when}${isNew?'<span class="new">NEW</span>':""}</div>
   <div class="name">${esc(s.scenario)}</div>
   <div class="meta"><span class="reg">【${esc(s.reg||"—")}】</span>${s.gm?`<span>GM: ${esc(s.gm)}</span>`:""}${s.source==="manual"?"<span>✍ 手動掲載</span>":""}</div>`;
  list.appendChild(a);
 });
}
function esc(t){const d=document.createElement("div");d.textContent=t||"";return d.innerHTML}
document.querySelectorAll("#filters .f").forEach(b=>b.addEventListener("click",()=>{
 document.querySelectorAll("#filters .f").forEach(x=>x.classList.remove("on"));b.classList.add("on");FILTER=b.dataset.f;render()}));
fetch("sessions.json?t="+Date.now()).then(r=>r.json()).then(d=>{
 DATA=d;
 document.getElementById("fresh").innerHTML=`最終更新: ${d.updated||"?"}　<span style="opacity:.7">（15分ごとに自動更新）</span>`;
 render();
}).catch(()=>{document.getElementById("list").innerHTML=`<div class="empty">データの読込に失敗しました</div>`});
})();
</script>
</body>
</html>
