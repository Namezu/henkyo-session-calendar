name: 卓予定の自動収集（15分毎）

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存インストール
        run: pip install -q "discord.py>=2.3" python-dotenv

      - name: 卓部屋フォーラムを収集
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          BOARD_GUILD_ID: ${{ vars.BOARD_GUILD_ID || '1023884809774305301' }}
          BOARD_FORUMS: ${{ vars.BOARD_FORUMS || '🏡卓部屋一覧-test' }}
          BOARD_OUT: sessions.json
        run: python collect/collect_sessions.py

      - name: 変化があればコミット
        run: |
          if git diff --quiet -- sessions.json; then
            echo "変化なし＝コミットしない"
          else
            git config user.name "polistes-board"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sessions.json
            git commit -m "🐝 卓予定を自動更新"
            git push
          fi
